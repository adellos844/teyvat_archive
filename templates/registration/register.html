{% extends 'core/base.html' %}
{% block content %}
<div class="login-box">
    <h2>Registro de Viajero</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-container">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn-register">Crear Cuenta</button>
    </form>
    <p class="auth-footer">
        ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión aquí</a>
    </p>
</div>
{% endblock %}
